<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра про покемонов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .balance-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .balance-item {
            font-size: 24px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        .balance-item span {
            font-weight: bold;
            color: #ffd700;
        }
        button {
            background: #ffd700;
            color: #333;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            border-radius: 40px;
            margin: 20px 0;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        button:active {
            transform: scale(0.98);
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-size: 16px;
        }
        .success {
            background: rgba(0,255,0,0.2);
            color: #aaffaa;
        }
        .error {
            background: rgba(255,0,0,0.2);
            color: #ffaaaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Покемон игра</h1>
        
        <div class="balance-card">
            <div class="balance-item">
                🐱 Баланс покемонов: <span id="pokemonBalance">0</span>
            </div>
            <div class="balance-item">
                💰 TON: <span id="tonBalance">0</span>
            </div>
        </div>

        <button onclick="buyMint()">
            🌟 КУПИТЬ МИНТ (1 TON)
        </button>

        <div id="status" class="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Показываем статус
        function showStatus(text, isSuccess = true) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = 'status ' + (isSuccess ? 'success' : 'error');
            setTimeout(() => {
                statusDiv.textContent = '';
                statusDiv.className = 'status';
            }, 3000);
        }

        // Покупка минта
        function buyMint() {
            tg.sendData(JSON.stringify({
                action: 'buy_mint'
            }));
            showStatus('⏳ Запрос отправлен...', true);
        }

        // Слушаем ответы от бота (через всплывающие окна)
        tg.onEvent('popupClosed', function() {
            // Можно обновить данные
            console.log('Popup closed');
        });

        console.log('Игра загружена');
    </script>
</body>
</html>
