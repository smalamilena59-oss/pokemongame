<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра про покемонов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
        }
        .balance-card {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
        }
        .balance-item {
            font-size: 24px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        button {
            background: #ffd700;
            color: #333;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            border-radius: 40px;
            margin: 20px 0;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255,255,255,0.2);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Покемон игра</h1>
        
        <div class="balance-card">
            <div class="balance-item">
                🐱 Баланс покемонов: <span id="pokemonBalance">0</span>
            </div>
            <div class="balance-item">
                💰 TON: <span id="tonBalance">0</span>
            </div>
        </div>

        <button onclick="buyMint()">
            🌟 КУПИТЬ МИНТ
        </button>

        <div id="message" class="message"></div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Показываем сообщение на странице
        function showMessage(text) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            
            // Убираем сообщение через 3 секунды
            setTimeout(() => {
                msgDiv.textContent = '';
            }, 3000);
        }

        // Покупка минта
        function buyMint() {
            // Показываем сообщение на странице
            showMessage('⏳ Запрос отправлен...');
            
            // Отправляем данные боту
            const data = {
                action: 'buy_mint',
                timestamp: new Date().toISOString()
            };
            
            tg.sendData(JSON.stringify(data));
            
            // Просто логируем в консоль (без showAlert)
            console.log('Данные отправлены:', data);
        }

        console.log('Игра загружена, версия Telegram Web App:', tg.version);
    </script>
</body>
</html>
