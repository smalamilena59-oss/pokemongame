<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра про покемонов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
        }
        .balance-card {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
        }
        .balance-item {
            font-size: 24px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        .balance-item span {
            font-weight: bold;
            color: #ffd700;
        }
        button {
            background: #ffd700;
            color: #333;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            border-radius: 40px;
            margin: 20px 0;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Покемон игра</h1>
        
        <div class="balance-card">
            <div class="balance-item">
                🐱 Баланс покемонов: <span id="pokemonBalance">0</span>
            </div>
            <div class="balance-item">
                💰 TON: <span id="tonBalance">0</span>
            </div>
        </div>

        <button onclick="buyMint()">
            🌟 КУПИТЬ МИНТ (1 TON)
        </button>

        <div id="status" class="status"></div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Показываем статус
        function showStatus(text, isSuccess = true) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.style.background = isSuccess ? 'rgba(0,255,0,0.2)' : 'rgba(255,0,0,0.2)';
            statusDiv.style.color = isSuccess ? '#aaffaa' : '#ffaaaa';
            
            setTimeout(() => {
                statusDiv.textContent = '';
                statusDiv.style.background = '';
                statusDiv.style.color = '';
            }, 3000);
        }

        // Покупка минта
        function buyMint() {
            // Показываем статус
            showStatus('⏳ Отправка запроса...', true);
            
            // Отправляем данные боту
            const data = {
                action: 'buy_mint',
                timestamp: new Date().toISOString()
            };
            
            tg.sendData(JSON.stringify(data));
            
            // Дополнительно показываем всплывающее окно
            tg.showAlert('Запрос на покупку минта отправлен! Проверь чат с ботом');
            
            console.log('Данные отправлены:', data);
        }

        // Логируем инициализацию
        console.log('Игра загружена');
        console.log('Telegram Web App:', tg);
    </script>
</body>
</html>
