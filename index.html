<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя игра про покемонов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 32px;
        }
        .balance {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            background: #ffd700;
            color: #333;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            margin: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Добро пожаловать!</h1>
        <div class="balance">
            <p>Баланс покемонов: <span id="pokemonBalance">0</span></p>
            <p>💰 TON: <span id="tonBalance">0</span></p>
        </div>
        <button onclick="buyMint()">🌟 Купить минт</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function buyMint() {
            tg.sendData(JSON.stringify({
                action: 'buy_mint'
            }));
            tg.showAlert('Запрос на покупку минта отправлен!');
        }
        
        // Здесь потом будет получение данных от бота
    </script>
</body>
</html>
